<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Všechno nejlepší 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* Pozadí */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: url('background.jpg') center/cover no-repeat;
            filter: blur(10px) brightness(0.5);
            z-index: -1;
        }

        /* Obsah */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 700px;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.9;
            color: #ff4f8b;
        }

        /* Tlačítko */
        .btn {
            margin-top: 30px;
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            background: #ff4f8b;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff2d72;
            transform: scale(1.05);
        }

        /* Animace */
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="content">
    <h1>🎉 Všechno nejlepší k 17 🎉</h1>

    <p>
        Dneska máš svůj den, tak jsem ti připravil něco speciálního.  
        Malý interaktivní narozeninový zážitek, který jsme si vytvořili jen my dva.
    </p>

    <p>
        Čeká tě dort, svíčky, otázky, vzpomínky…  
        A když všechno zvládneš, otevře se ti něco, co je jen pro tebe.
    </p>

    <button class="btn" onclick="start()">Pokračovat</button>
</div>

<script>
function start() {
    window.location.href = "cake.html";
}
</script>

</body>
</html>
