<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Všechno nejlepší 🎉</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: "Poppins", sans-serif;
            color: #333;
            scroll-behavior: smooth;
            /* DŮLEŽITÉ */
        }
.content {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    animation: fadeIn 1.2s ease;
    padding: 40px 20px;

    margin: 0; /* DŮLEŽITÉ – odstraní posun */
}



        img.stitch {
            width: 260px;
            height: auto;
            margin-bottom: 20px;
            animation: pop 0.6s ease;
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .btn {
            margin-top: 35px;
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            background: #4aa3ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1f8bff;
            transform: scale(1.05);
        }

        /* Dort sekce */
        #cake-section {
            margin-top: 120px;
            padding: 40px 0;
            text-align: center;
        }

        img.cake {
            width: 300px;
            height: auto;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="content">
        <img src="/stitch_break.png" class="stitch" alt="Stitch">

        <h1>🎉 Všechno nejlepší k 17 🎉</h1>

        <p>
            Dneska slavíš, takže jsem ti připravil něco malého.
            Takový mini narozeninový zážitek, který je jen pro tebe.
        </p>

        <p>
            Čeká tě dort, svíčky, otázky a nakonec i jedno malé překvapení.
        </p>

        <button class="btn" onclick="scrollToCake()">Pokračovat</button>
    </div>

    <!-- 🔽 Druhá sekce – dort -->
    <div id="cake-section">
        <h2>🎂 Tvůj narozeninový dort</h2>
        <p>Klikni na svíčky a začni svou narozeninovou výzvu.</p>

        <img src="/cake.png" class="cake" alt="Dort">
    </div>

    <script>
        function scrollToCake() {
            document.getElementById("cake-section").scrollIntoView({ behavior: "smooth" });
        }
    </script>

</body>

</html>
