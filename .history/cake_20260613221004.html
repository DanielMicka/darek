<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Dort 🎂</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container fade">

        <h2>🎂 Tvůj narozeninový dort</h2>

        <p>Klikni na svíčky a začni svou narozeninovou výzvu.</p>

        <div class="cake-wrapper" style="margin-top: 50px;">
            <img src="cake.png" class="cake">

            <!-- Svíčka 1 -->
            <img src="svíčka_ende.png" class="candle c1" data-id="1">

            <!-- Svíčka 2 -->
            <img src="svíčka_ende.png" class="candle c2" data-id="2">

            <!-- Svíčka 3 -->
            <img src="svíčka_ende.png" class="candle c3" data-id="3">

            <!-- Svíčka 4 -->
            <img src="svíčka_ende.png" class="candle c4" data-id="4">

            <!-- Svíčka 5 -->
            <img src="svíčka_ende.png" class="candle c5" data-id="5">
        </div>

        <button id="wish-btn" class="btn" style="display:none; margin-top:30px;">
            Přáníčko 🎁
        </button>


    </div>




</body>
<script>
    document.getElementById("wish-btn").onclick = () => {
        window.location.href = "pranicko.html";
    };
    // Počet svíček
    const totalCandles = 5;

    // Propojení svíček s otázkami
document.querySelectorAll(".candle").forEach(candle => {
    let id = candle.dataset.id;

    // Pokud je svíčka už hotová → zakážeme kliknutí
    if (localStorage.getItem("candle" + id) === "true") {
        candle.style.pointerEvents = "none"; // nejde kliknout
        return;
    }

    // Jinak normálně funguje
    candle.onclick = () => {
        window.location.href = `q${id}.html`;
    };
});


    // Po načtení stránky nastavíme sfouknuté svíčky
    for (let i = 1; i <= totalCandles; i++) {
        if (localStorage.getItem("candle" + i) === "true") {
            const c = document.querySelector(`.candle[data-id="${i}"]`);
            if (c) c.src = "svíčka-ohen.png"; // tvoje sfouknutá verze
        }
    }

    // Kontrola, zda jsou všechny hotové
    function checkAllDone() {
        let done = 0;

        for (let i = 1; i <= totalCandles; i++) {
            if (localStorage.getItem("candle" + i) === "true") {
                done++;
            }
        }

        if (done === totalCandles) {
            document.getElementById("wish-btn").style.display = "block";
        }
    }

    checkAllDone();
</script>


</html>
